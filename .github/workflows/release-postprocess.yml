# Follow-up jobs that run after the dist-generated Release workflow completes.
# Kept in a separate file so that `dist generate` can freely regenerate release.yml
# without overwriting these hand-maintained steps.

name: Release Follow-up
permissions: {}

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

jobs:
  # Extract release metadata from the dist manifest produced by the Release workflow.
  check:
    runs-on: "ubuntu-22.04"
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      actions: read
      contents: read
    outputs:
      tag: ${{ steps.info.outputs.tag }}
      is_prerelease: ${{ steps.info.outputs.is_prerelease }}
    steps:
      - name: Download dist manifest
        uses: actions/download-artifact@v8
        with:
          name: artifacts-dist-manifest
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract release info
        id: info
        run: |
          tag=$(jq -r '.announcement_tag' dist-manifest.json)
          is_prerelease=$(jq -r '.announcement_is_prerelease' dist-manifest.json)
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$is_prerelease" >> "$GITHUB_OUTPUT"

  # Remove release assets that are useful for dist/publishing but should not be shown as end-user downloads.
  cleanup-release-assets:
    needs: check
    if: ${{ needs.check.outputs.is_prerelease == 'false' }}
    runs-on: "ubuntu-22.04"
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: ${{ needs.check.outputs.tag }}
      REPO: ${{ github.repository }}
    steps:
      - name: Delete internal release assets
        shell: bash
        run: |
          for asset in dist-manifest.json moove.rb sha256.sum; do
            gh release delete-asset "$TAG" "$asset" --repo "$REPO" --yes
          done

  # Push the generated Homebrew formula to urin/homebrew-moove tap repository.
  publish-homebrew-formula:
    needs: check
    if: ${{ needs.check.outputs.is_prerelease == 'false' }}
    runs-on: "ubuntu-22.04"
    permissions:
      actions: read
      contents: read
    env:
      TAG: ${{ needs.check.outputs.tag }}
    steps:
      - name: Checkout tap repository
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/homebrew-moove
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          persist-credentials: true
      - name: Download formula artifact
        uses: actions/download-artifact@v8
        with:
          pattern: artifacts-*
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: Formula/
          merge-multiple: true
      - name: Commit and push formula to tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/
          git commit -m "Update formula for moove $TAG" || echo "Nothing to commit"
          git push

  # Publish the Windows archive to the WinGet package repository via wingetcreate.
  publish-winget:
    needs: check
    if: ${{ needs.check.outputs.is_prerelease == 'false' }}
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: ${{ needs.check.outputs.tag }}
      REPO: ${{ github.repository }}
    steps:
      - name: Publish to WinGet
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        shell: pwsh
        run: |
          $version = $env:TAG.TrimStart('v')
          Write-Host "Fetching assets for tag: $env:TAG"
          $assets = gh release view $env:TAG --repo $env:REPO --json assets -q '.assets[].name'
          Write-Host "Available assets: $assets"
          $assetName = (gh release view $env:TAG --repo $env:REPO --json assets --jq '[.assets[] | select(.name | test("\\.zip$")) | .name][0]')
          Write-Host "Selected asset: $assetName"
          if (-not $assetName -or $assetName -eq "null") {
            Write-Host "No .zip asset found. Exiting."
            exit 1
          }
          $url = "https://github.com/$env:REPO/releases/download/$([uri]::EscapeDataString($env:TAG))/$([uri]::EscapeDataString($assetName))"
          Write-Host "Selected URL: $url"
          Invoke-WebRequest -Uri https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe
          .\wingetcreate.exe update Urin.moove --version $version --urls $url --token $env:WINGET_TOKEN --submit

  # Generate and upload the Cargo vendor tarball for offline RPM builds in COPR.
  vendor-release:
    needs: check
    if: ${{ needs.check.outputs.is_prerelease == 'false' }}
    runs-on: "ubuntu-22.04"
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: ${{ needs.check.outputs.tag }}
      REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ needs.check.outputs.tag }}
      - name: Generate Cargo vendor tarball
        run: |
          version="${TAG#v}"
          cargo vendor vendor
          tar czf "moove-${version}-cargo-vendor.tar.gz" vendor
      - name: Upload Cargo vendor tarball to release
        run: |
          version="${TAG#v}"
          gh release upload "$TAG" "moove-${version}-cargo-vendor.tar.gz" --repo "$REPO"

  # Submit a build to Fedora COPR for the RPM package.
  # Required secrets: COPR_LOGIN, COPR_USERNAME, COPR_TOKEN (from copr.fedorainfracloud.org/api).
  publish-copr:
    needs: [check, vendor-release]
    if: ${{ needs.check.outputs.is_prerelease == 'false' }}
    runs-on: "ubuntu-22.04"
    env:
      TAG: ${{ needs.check.outputs.tag }}
      REPO: ${{ github.repository }}
      COPR_PROJECT: ${{ secrets.COPR_USERNAME }}/moove
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ needs.check.outputs.tag }}
      - name: Install copr-cli
        run: sudo pip3 install copr-cli rich
      - name: Configure copr-cli
        run: |
          mkdir -p ~/.config
          cat > ~/.config/copr <<EOF
          [copr-cli]
          login = ${{ secrets.COPR_LOGIN }}
          username = ${{ secrets.COPR_USERNAME }}
          token = ${{ secrets.COPR_TOKEN }}
          copr_url = https://copr.fedorainfracloud.org
          EOF
      - name: Submit build to COPR
        run: |
          copr-cli buildscm \
            --clone-url "https://github.com/$REPO" \
            --commit "$TAG" \
            --spec packaging/rpm/moove.spec \
            --type git \
            --nowait \
            "$COPR_PROJECT"
